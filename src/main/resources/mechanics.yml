mechanics:
  # display cords when the player holds compass
  compass:
    enabled: true
  # display time when player holds a clock
  clock:
    enabled: true
  # display last death location when player holds recovery_compass
  recovery-compass:
    enabled: true
  # entity health and distance when a player uses spyglass
  spyglass:
    enabled: true
    cooldown: 3
  # change your size when eat
  # ItemsAdder - ia:<id> Nexo - nexo:<id>
  size:
    enabled: true
    small: GLOW_BERRIES
    normal: GOLDEN_CARROT
  # add dolphin's grace effect when a player is in water and has a turtle helmet in the head
  turtle-helmet:
    enabled: true
    # 30% chance to set -1 durability when player is in water (every 2 sec)
    durability: true
  # fireball likes a ghost when player right-click with fire charge
  fireball:
    enabled: true
    cooldown: 40
    # fireball break scale, high value = more explosion
    yield: 2
  # drop player head when player dies
  player-head:
    enabled: true
    # chance to drop player head, 1 = 100%
    chance: 0.2
  # activate totem of undying when player dies in void, apply levitation effect
  void-totem:
    enabled: true
  # allows players to mine spawners using Silk Touch or special items
  mine-spawners:
    enabled: true
    # if true, spawners placed by players will always drop
    always-drop-placed-by-players: true
    types:
      normal:
        silk-touch: true
        chance: 0.9
        # ItemsAdder - ia:<id> Nexo - nexo:<id>
        tools:
          - 'DIAMOND_PICKAXE'
        worlds:
          - 'world'
      nether:
        silk-touch: false
        chance: 0.9
        tools:
          - 'NETHERITE_PICKAXE'
        worlds:
          - 'world_nether'

  # mine budding amethyst with silk touch
  mine-budding-amethyst:
    enabled: true
  #show mob hp:
  entity-hp:
    enabled: true
  # chance to drop blaze rod when a blaze dies on water, 50% chance - 1 rod, 10% chance - 2 rods
  blaze-water-drop:
    enabled: true
  # villager profession cooldown, 5 sec
  villager-profession-cooldown:
    enabled: false
    # cooldown time in seconds
    cooldown: 90
  # Shift + right click to hide/unhide item frame
  invisible-item-frames:
    enabled: true
  # keep 50% items when player dies
  keep-items:
    enabled: false
    # worlds where keep-items are disabled
    disabled-worlds:
      - 'example_world'
  mace-nerf:
    enabled: true
    # Reduces mace damage by a percentage.
    # Example: 60 = damage is reduced by 60%, so only 40% remains.
    # If the original damage is 20, the final damage will be 8.
    # Final damage is also capped by maceMaxDamage.
    percentage: 40
    #maximum damage that a mace hit can deal after all calculations (prevents extremely high smash damage)
    max-damage: 35
    disable-world:
      - 'example_world'

  spear-nerf:
    enabled: true
    # Reduces spear damage by a percentage.
    # Example: 60 = damage is reduced by 60%, so only 40% remains.
    # If the original damage is 20, the final damage will be 8.
    # Final damage is also capped by spearMaxDamage.
    percentage: 40
    #maximum damage a spear hit can deal
    max-damage: 35
    disable-world:
      - 'example_world'

  #boost happy ghost speed and hp
  happy-ghost-boost:
    enabled: true
    speed-multiplier: 1.5
    hp: 100
  #remove the anvil too expensive limit, change too expensive to mas possible level (39) in anvil
  anvil-too-expensive-fix:
    enabled: true
  # add custom dead messages
  dead-messages:
    enabled: true
  #protections from grief explosions, like tnt, end crystal, respawn anchor
  grief-protection:
    enabled: false
    block-tnt-explosion: true
    block-crystal-explosion: true
    block-anchor-explosion: true
    block-tnt-minecart: true
  #nerf furnace fuels, values: furnace.yml
  furnace-fuel-nerf:
    enabled: false
  #wither work only in nether
  nether-wither:
    enabled: false
  # random names to villagers, making each one unique.
  villagers-random-names:
    enabled: true
    names:
      - 'Steve'
      - 'Alex'
      - 'Notch'